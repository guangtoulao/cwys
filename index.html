<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>君子兰主页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif;}
body{
    background-image: url("https://cwys.qzz.io/icons/桌面.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    padding:40px 20px; /* 页面整体边距：上下40px，左右20px，数值变大页面留白更大 */
    min-height: 100vh; /* 页面最小高度，不用改 */
}
.box-wrap{
    background:rgba(255,255,255,0.6);
    border-radius:14px;
    padding:24px; /* 板块内边距：上下左右，数值变大板块内部留白更多 */
    margin-bottom:32px; /* 板块下方外边距，控制板块之间垂直距离 */
    max-width:1100px; /* 【改板块最大宽度】数值越大，整体页面越宽 */
    margin-left:auto;
    margin-right:auto;
}

/* ====================== 搜索框 全部尺寸标注 ====================== */
.search-wrap{
    display:flex;
    align-items:center;
    padding:16px 20px; /* 【改搜索框高度+左右宽度】上下16px控制高度；左右20px控制横向宽度 */
    gap:12px; /* 搜索框内文字和按钮之间的横向间距 */
    margin-bottom:40px; /* 搜索框下方垂直外边距，控制和下方图标区域距离 */
    background:#f3f5f9;
    border-radius:12px; /* 圆角大小，数值越大圆角越圆 */
    max-width:700px; /* 【改搜索框整体宽度】数字越大搜索框越宽 */
    margin-left:auto;
    margin-right:auto;
}
.search-input{
    flex:1;
    border:none;
    outline:none;
    font-size:16px; /* 【改输入文字大小】数字越大文字越大 */
    padding:8px 10px; /* 输入框内上下高度、左右宽度 */
    background:transparent;
}
.search-btn{
    background:#3b6ef7;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px; /* 【按钮文字大小】 */
    padding:9px 24px; /* 【按钮高度9px / 按钮宽度24px】 */
    cursor:pointer;
}

/* ====================== 顶部图标网格 尺寸标注 ====================== */
.icon-grid{
    display:grid;
    /* minmax(单个格子最小宽度, 1fr)：80px 【改每个图标格子宽度】 */
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap:18px; /* 图标格子之间 横向+纵向间距，数字变大格子间隙更大 */
}
.icon-card{
    text-align:center;
    cursor:pointer;
}
.icon-img{
    width:48px;  /* 【图标图片宽度】 */
    height:48px; /* 【图标图片高度】宽高一致为正方形 */
    border-radius:8px;
    object-fit:cover;
    margin-bottom:8px; /* 图片和下方文字的垂直距离 */
}
.icon-text{
    font-size:13px; /* 【图标下方文字大小】 */
    color:#222;
    line-height:1.3; /* 文字行高，控制文字上下高度 */
}

/* ====================== 分类标签栏 尺寸标注 ====================== */
.tab-bar{
    display:flex;
    gap:36px; /* 标签之间横向间距 */
    border-bottom:1px solid #eee;
    padding-bottom:12px; /* 标签底部内边距，控制标签和底线距离 */
    margin-bottom:24px; /* 标签栏和下方接口区域垂直间距 */
    overflow-x:auto;
}
.tab-item{
    display:flex;
    align-items:center;
    gap:6px; /* 标签图标和文字横向间距 */
    font-size:18px; /* 【标签文字大小】 */
    color:#555;
    padding:8px 0; /* 标签上下内边距，控制标签高度 */
    cursor:pointer;
    position:relative;
    white-space:nowrap;
}
.tab-item.active::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-13px;
    width:100%; /* 底线宽度铺满标签 */
    height:3px; /* 【底线粗细高度】数字越大线条越粗 */
    background:#32c870;
}
.tab-item.active{
    color:#000;
}
.tab-icon{
    font-size:20px; /* 标签图标尺寸 */
}

/* ====================== 接口容器网格 尺寸标注 ====================== */
.category-icon-box{
    display:grid;
    gap:18px 12px; /* 第一个数字：行与行垂直间距；第二个：列与列横向间距 */
}
.category-icon-box.tvbox-mode {
    grid-template-columns: repeat(3, 1fr); /* 固定3列均分宽度，不用改 */
}
.category-icon-box.normal-mode {
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap:18px;
}

/* ====================== 1.接口格子整体宽高修改处 ====================== */
.api-item{
    text-align:center;
    cursor:pointer;
    /* padding:上下内边距(控制格子高度)  左右内边距(控制格子横向宽度) */
    padding:16px 6px;
    border-radius:12px; /* 格子圆角大小 */
    transition: all 0.2s ease;
    position:relative;
}
.api-item:hover{
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

/* ====================== 2.接口文字大小修改处 ====================== */
.api-name{
    font-size:24px; /* 【接口文字整体大小】数字越大文字越大 */
    margin-bottom:8px; /* 文字和下方彩色线条垂直距离 */
    color:#111;
    transition: color 0.2s ease;
}
.api-item:hover .api-name{
    color:#ffffff;
}

/* ====================== 3.底部彩色线条修改处 ====================== */
.api-line{
    height:4px;    /* 【线条粗细高度】数字越大线条越粗 */
    border-radius:99px;
    display:inline-block;
    width:65%;     /* 【线条长度宽度】百分比越小线条越短 */
}

/* ====================== 影视购物小图标卡片 尺寸标注 ====================== */
.link-card{
    text-align:center;
    cursor:pointer;
}
.link-card-img{

    height:48px; /* 图片高度 */
    border-radius:8px;
    object-fit:cover;
    margin-bottom:8px; /* 图片与文字垂直间距 */
}
.link-card-text{
    font-size:13px; /* 文字大小 */
    color:#222;
    line-height:1.3; /* 文字行高（上下高度） */
}
</style>
</head>

function renderCat(key){
    const wrap = document.getElementById("categoryWrap");
    if(key === "tvbox"){
        wrap.className = "category-icon-box tvbox-mode";
    }else{
        wrap.className = "category-icon-box normal-mode";
    }
    const arr = groupData[key];
    if(arr.length === 0){
        wrap.innerHTML = "<div style='grid-column:1/-1;text-align:center;padding:30px;color:#666'>暂无内容</div>";
        return;
    }
    let html = "";
    if(key === "tvbox"){
        arr.forEach(item=>{
            html += `
            <div class="api-item" data-copy="${item.copy}" data-fill="${item.lineColor}" onclick="copyText(this)" onmouseenter="fillColor(this)" onmouseleave="clearFill(this)">
                <div class="api-name">${item.name}</div>
                <span class="api-line" style="background: ${item.lineColor};"></span>
            </div>
            `;
        })
    }else{
        arr.forEach(item=>{
            html += `
            <div class="link-card" onclick="openUrl('${item.link}')">
                <img class="link-card-img" src="${item.img}" alt="${item.name}">
                <div class="link-card-text">${item.name}</div>
            </div>
            `;
        })
    }
    wrap.innerHTML = html;
}
// 悬浮填充当前条目对应彩色（不再灰色）
function fillColor(el){
    const c = el.dataset.fill;
    el.style.background = c;
}
function clearFill(el){
    el.style.background = "transparent";
}

function copyText(el){
    const text = el.dataset.copy;
    navigator.clipboard.writeText(text).then(()=>{
        alert("已复制接口："+text);
    }).catch(()=>{
        alert("复制失败，请手动复制："+text);
    })
}

function openUrl(url){
    if(!url) return;
    window.open(url,"_blank");
}

const tabs = document.querySelectorAll(".tab-item");
tabs.forEach(t=>{
    t.onclick = ()=>{
        tabs.forEach(i=>i.classList.remove("active"));
        t.classList.add("active");
        renderCat(t.dataset.key);
    }
})
renderCat("tvbox");

function search(){
    let val = document.getElementById("kw").value.trim();
    if(!val) return alert("请输入关键词");
    window.open(`https://www.baidu.com/s?wd=${encodeURIComponent(val)}`,"_blank");
}
document.getElementById("kw").addEventListener("keydown",e=>e.key=="Enter"&&search())
</script>
</body>
</html>
