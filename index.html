<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>空壳接口导航</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif;}
/* ========== 全局页面 调整区【整体背景、页面上下左右留白】 ========== */
body{
    background:#f7f8fa;
    min-height:100vh;
    padding:40px 20px; /* 页面上下留白 | 页面左右留白 */
    max-width:1100px;   /* 页面整体最大宽度，不会无限拉宽 */
    margin:0 auto;      /* 页面整体居中 */
}

/* ========== 顶部搜索框模块（和截图完全一致布局）调整区 ========== */
.search-wrap{
    background:#ffffff;
    border-radius:12px; /* 搜索框整体圆角大小 */
    display:flex;
    align-items:center;
    padding:12px 16px;  /* 搜索框上下内边距 | 左右内边距 */
    gap:10px;           /* 下拉、输入框、按钮之间空隙 */
    margin-bottom:40px; /* 搜索框和下方标题距离 */
    box-shadow:0 1px 3px #eee;
}
.search-select{
    border:none;
    background:transparent;
    font-size:16px;     /* 搜索引擎文字大小 */
    color:#333;
    padding:4px 6px;
}
.search-input{
    flex:1; /* 输入框自动占满中间剩余宽度 */
    border:none;
    outline:none;
    font-size:16px;     /* 输入框文字大小 */
    padding:6px 8px;
    background:transparent;
}
.search-btn{
    background:#3483eb;
    color:#fff;
    border:none;
    border-radius:8px;  /* 蓝色搜索按钮圆角 */
    font-size:15px;
    padding:8px 22px;   /* 按钮上下高度 | 按钮左右宽度 */
    cursor:pointer;
}

/* ========== 标题区域 调整区 ========== */
.page-title{
    text-align:center;
    font-size:42px;     /* 大标题字号 */
    color:#222;
    font-weight:bold;
    margin-bottom:10px;  /* 标题和说明文字间距 */
}
.page-desc{
    text-align:center;
    font-size:17px;     /* 小字说明字号 */
    color:#666;
    margin-bottom:30px; /* 说明文字和顶部分类栏间距 */
}

/* ========== 顶部横向分类标签（仿趣主页顶部大分类）调整区 ========== */
.top-tab-wrap{
    margin-bottom:35px; /* 顶部标签和图标区域距离 */
    display:flex;
    gap:12px;           /* 顶部各个大分类之间空隙 */
    overflow-x:auto;    /* 手机横向滚动不挤坏 */
    padding-bottom:6px;
}
.top-tab-item{
    padding:8px 18px;   /* 顶部标签胖瘦 */
    border-radius:8px;
    font-size:16px;
    color:#555;
    cursor:pointer;
    white-space:nowrap;
}
.top-tab-item.active{
    background:#fff;
    color:#222;
    box-shadow:0 1px 3px #eee;
    border-bottom:3px solid #32c870; /* 激活底部绿线，和截图AI助手一致 */
}

/* ========== 图标导航网格（横向均匀铺开）调整区 ========== */
.nav-grid{
    display:none; /* 默认隐藏，JS控制显示对应分类 */
    grid-template-columns: repeat(auto-fit, minmax(95px, 1fr)); /* 单个图标卡片最小宽度 */
    gap:18px;           /* 图标横向、纵向间距大小 */
    margin-bottom:35px; /* 图标和底部分类栏距离 */
}
.nav-grid.show{
    display:grid;
}
.nav-item{
    background:#fff;
    border-radius:10px; /* 单个图标卡片圆角 */
    padding:14px 6px;
    text-align:center;
    cursor:pointer;
    box-shadow:0 1px 3px #eee;
    transition:0.2s;
}
.nav-item:hover{transform:translateY(-3px);box-shadow:0 4px 10px #e0e0e0;}
.nav-icon{
    width:52px;         /* 彩色方块宽度 */
    height:52px;        /* 彩色方块高度 */
    border-radius:8px;
    margin:0 auto 9px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:22px;     /* 方块内文字大小 */
    font-weight:bold;
}
.nav-name{
    font-size:14px;     /* 图标下方文字大小 */
    color:#333;
}

/* ========== 底部分类标签栏（通栏长条）调整区 ========== */
.bottom-tab-wrap{
    background:#fff;
    border-radius:10px; /* 底部整栏圆角 */
    padding:12px 16px;  /* 分类栏上下、左右内边距 */
}
.bottom-tab-list{
    display:flex;
    gap:12px;           /* 各个分类标签之间空隙 */
}
.bottom-tab-item{
    padding:6px 16px;   /* 单个标签内边距（胖瘦） */
    border-radius:6px;  /* 标签圆角 */
    font-size:15px;     /* 标签文字大小 */
    color:#555;
    cursor:pointer;
}
.bottom-tab-item.active{
    background:#f24c7c; /* 激活标签玫红色背景 */
    color:#fff;
}
</style>
</head>
<body>
<!-- 1. 页面最顶部：搜索框 -->
<div class="search-wrap">
  <select class="search-select" id="engineSel">
    <option value="baidu">百度</option>
    <option value="bing">必应</option>
  </select>
  <input class="search-input" id="kwInput" placeholder="搜索影片、影视资源">
  <button class="search-btn" onclick="doSearch()">搜索</button>
</div>

<!-- 2. 标题+说明 -->
<div class="page-title">空壳 接口</div>
<div class="page-desc">点击图标自动复制对应接口链接</div>

<!-- 【新增：顶部横向大分类（和你截图休闲/AI助手布局完全一样）】 -->
<div class="top-tab-wrap">
  <div class="top-tab-item" data-tab="video">影视接口</div>
  <div class="top-tab-item" data-tab="agg">聚合源</div>
  <div class="top-tab-item" data-tab="live">直播源</div>
  <div class="top-tab-item" data-tab="tool">工具</div>
  <div class="top-tab-item" data-tab="set">设置</div>
</div>

<!-- 3. 多套图标网格，点击顶部分类自动切换显示 -->
<!-- 分类1：影视接口（默认展示） -->
<div class="nav-grid show" data-content="video">
  <div class="nav-item" onclick="copyLink('饭太硬接口地址')">
    <div class="nav-icon" style="background:#0088ff">饭</div>
    <div class="nav-name">饭太硬</div>
  </div>
  <div class="nav-item" onclick="copyLink('君子兰接口地址')">
    <div class="nav-icon" style="background:#ff3388">君</div>
    <div class="nav-name">君子兰</div>
  </div>
  <div class="nav-item" onclick="copyLink('潇洒接口地址')">
    <div class="nav-icon" style="background:#ff9900">潇</div>
    <div class="nav-name">潇洒</div>
  </div>
  <div class="nav-item" onclick="copyLink('摸鱼接口地址')">
    <div class="nav-icon" style="background:#ffdd00">摸</div>
    <div class="nav-name">摸鱼</div>
  </div>
  <div class="nav-item" onclick="copyLink('王二小接口地址')">
    <div class="nav-icon" style="background:#bbee22">王</div>
    <div class="nav-name">王二小</div>
  </div>
  <div class="nav-item" onclick="copyLink('影视仓接口地址')">
    <div class="nav-icon" style="background:#22dd66">影</div>
    <div class="nav-name">影视仓</div>
  </div>
  <div class="nav-item" onclick="copyLink('巧技接口地址')">
    <div class="nav-icon" style="background:#0077cc">巧</div>
    <div class="nav-name">巧技</div>
  </div>
  <div class="nav-item" onclick="copyLink('点播接口地址')">
    <div class="nav-icon" style="background:#bbbbbb">点</div>
    <div class="nav-name">点播</div>
  </div>
  <div class="nav-item" onclick="copyLink('宝盒接口地址')">
    <div class="nav-icon" style="background:#999999">宝</div>
    <div class="nav-name">宝盒</div>
  </div>
</div>

<!-- 分类2：聚合源（点击顶部「聚合源」显示） -->
<div class="nav-grid" data-content="agg">
  <div class="nav-item" onclick="copyLink('聚合源1地址')">
    <div class="nav-icon" style="background:#722ed1">聚</div>
    <div class="nav-name">聚合一</div>
  </div>
  <div class="nav-item" onclick="copyLink('聚合源2地址')">
    <div class="nav-icon" style="background:#13c2c2">合</div>
    <div class="nav-name">聚合二</div>
  </div>
  <div class="nav-item" onclick="copyLink('聚合源3地址')">
    <div class="nav-icon" style="background:#fa8c16">源</div>
    <div class="nav-name">聚合三</div>
  </div>
</div>

<!-- 分类3：直播源 -->
<div class="nav-grid" data-content="live">
  <div class="nav-item" onclick="copyLink('直播源1')">
    <div class="nav-icon" style="background:#f5222d">直</div>
    <div class="nav-name">央视直播</div>
  </div>
  <div class="nav-item" onclick="copyLink('直播源2')">
    <div class="nav-icon" style="background:#52c41a">播</div>
    <div class="nav-name">地方台</div>
  </div>
</div>

<!-- 分类4：工具 -->
<div class="nav-grid" data-content="tool">
  <div class="nav-item" onclick="copyLink('工具链接1')">
    <div class="nav-icon" style="background:#1890ff">工</div>
    <div class="nav-name">解析工具</div>
  </div>
</div>

<!-- 分类5：设置 -->
<div class="nav-grid" data-content="set">
  <div class="nav-item">
    <div class="nav-icon" style="background:#8c8c8c">设</div>
    <div class="nav-name">网站设置</div>
  </div>
</div>

<!-- 底部静态标签栏（仅展示，不切换内容） -->
<div class="bottom-tab-wrap">
  <div class="bottom-tab-list">
    <div class="bottom-tab-item active">影视接口</div>
    <div class="bottom-tab-item">聚合源</div>
    <div class="bottom-tab-item">直播源</div>
    <div class="bottom-tab-item">工具</div>
    <div class="bottom-tab-item">设置</div>
  </div>
</div>

<script>
// ========== 顶部分类切换核心逻辑（实现你截图点击分类换图标效果） ==========
const topTabs = document.querySelectorAll('.top-tab-item');
const allContent = document.querySelectorAll('.nav-grid');
// 默认激活第一个标签
topTabs[0].classList.add('active');

topTabs.forEach(tab=>{
  tab.addEventListener('click',()=>{
    // 清除全部激活状态
    topTabs.forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    // 隐藏所有图标区
    allContent.forEach(block=>block.classList.remove('show'));
    // 显示当前分类对应图标
    const targetKey = tab.getAttribute('data-tab');
    document.querySelector(`.nav-grid[data-content="${targetKey}"]`).classList.add('show');
  })
})

// 搜索功能（回车/点击按钮均可搜索）
function doSearch(){
  let kw = document.getElementById("kwInput").value.trim();
  let eng = document.getElementById("engineSel").value;
  if(!kw) return alert("请输入搜索关键词");
  let url = eng === "baidu" 
    ? `https://www.baidu.com/s?wd=${encodeURIComponent(kw)}`
    : `https://cn.bing.com/search?q=${encodeURIComponent(kw)}`;
  window.open(url,"_blank");
}
document.getElementById("kwInput").addEventListener("keydown",e=>e.key==="Enter"&&doSearch())

// 复制接口功能（替换引号内为你的真实接口链接即可恢复之前复制功能）
function copyLink(url){
  navigator.clipboard.writeText(url).then(()=>{
    alert("复制成功："+url);
  })
}
</script>
</body>
</html>
