<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>空壳接口导航</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
/* ========== 全局页面 边距调整区【改这里控制整体上下左右留白】 ========== */
body{
    background:#f7f8fa;
    min-height:100vh;
    padding: 30px 15px; /* 页面上下内边距 | 页面左右内边距 */
}

/* 搜索框模块 放在页面最顶部 */
.search-wrap{
    width:min(94%, 1000px);/* 搜索框最大宽度 */
    margin:0 auto;
    background:#fff;
    border-radius:10px;
    display:flex;
    align-items:center;
    /* ========== 搜索框内边距、底部间距【调整区】 ========== */
    padding: 10px 14px;  /* 搜索框上下内边距 | 左右内边距 */
    margin-bottom: 30px; /* 搜索框和标题的距离 */
    box-shadow:0 1px 4px #e0e0e0;
}
.search-select{
    border:none;
    background:transparent;
    /* ========== 搜索引擎下拉文字大小【调整区】 ========== */
    font-size: 15px;
    padding:0 6px;
    color:#333
}
.search-input{
    flex:1;
    border:none;
    background:transparent;
    outline:none;
    /* ========== 搜索输入框文字大小【调整区】 ========== */
    padding: 9px 10px;
    font-size: 17px;
}
.search-btn{
    border:none;
    background:#3483eb;
    color:#fff;
    border-radius:7px;
    cursor:pointer;
    /* ========== 搜索按钮尺寸【调整区】 ========== */
    padding: 9px 20px; /* 按钮上下 | 按钮左右宽度 */
    font-size: 15px;
}

/* 标题区域（搜索框下方） */
.page-title{
    text-align:center;
    color:#222;
    /* ========== 标题大小、上下间距【调整区】 ========== */
    font-size: 36px;    /* 标题文字大小 */
    margin-bottom: 12px;/* 标题和描述的距离 */
    font-weight:bold
}
.page-desc{
    text-align:center;
    color:#666;
    /* ========== 描述文字大小、底部间距【调整区】 ========== */
    font-size: 16px;    /* 说明文字大小 */
    margin-bottom: 35px;/* 描述和图标网格的距离 */
}

/* 图标网格区域（核心，仿趣主页多列图标） */
.nav-grid{
    width:min(94%, 1000px);
    margin:0 auto;
    display:grid;
    /* ========== 图标网格列宽、图标之间间距【调整区】 ========== */
    grid-template-columns: repeat(auto-fill, minmax(82px, 1fr)); /* 单个图标格子最小宽度 */
    gap: 14px; /* 图标横向、纵向间距大小 */
    margin-bottom: 25px; /* 图标网格和底部分类栏距离 */
}
.nav-item{
    background:#ffffff;
    border-radius:9px;
    padding:10px 4px;
    text-align:center;
    cursor:pointer;
    transition:0.18s;
    box-shadow:0 1px 3px #e5e5e5;
}
.nav-item:hover{transform:translateY(-2px);box-shadow:0 3px 8px #ddd}
.nav-icon{
    border-radius:7px;
    margin:0 auto 7px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-weight:bold;
    /* ========== 图标方块尺寸、文字大小【调整区】 ========== */
    width:46px;  /* 图标方块宽度 */
    height:46px; /* 图标方块高度 */
    font-size: 19px; /* 图标内文字大小 */
}
.nav-name{
    color:#333;
    /* ========== 图标下方文字大小【调整区】 ========== */
    font-size:13px;
}

/* 底部分类标签栏 */
.tab-wrap{
    width:min(94%, 1000px);
    margin:0 auto;
    background:#fff;
    border-radius:9px;
    padding:11px;
    box-shadow:0 1px 3px #e5e5e5;
}
.tab-list{
    display:flex;
    gap:9px;/* 标签之间间距 */
    flex-wrap:wrap
}
.tab-item{
    color:#555;
    border-radius:6px;
    cursor:pointer;
    /* ========== 分类标签内边距、文字大小【调整区】 ========== */
    padding:5px 13px;
    font-size:14px;
}
.tab-item.active{background:#f24c7c;color:#fff}
</style>
</head>
<body>
<!-- 【最顶部：搜索框】和趣主页完全一致的顺序 -->
<div class="search-wrap">
  <select class="search-select" id="engineSel">
    <option value="baidu">百度</option>
    <option value="bing">必应</option>
  </select>
  <input class="search-input" id="kwInput" placeholder="搜索影片、影视资源">
  <button class="search-btn" onclick="doSearch()">搜索</button>
</div>

<!-- 搜索框下方：标题+说明文字 -->
<div class="page-title">空壳 接口</div>
<div class="page-desc">点击图标自动复制对应接口链接</div>

<!-- 图标导航网格 -->
<div class="nav-grid">
  <div class="nav-item" onclick="copyLink('饭太硬接口地址')">
    <div class="nav-icon" style="background:#0099ff">饭</div>
    <div class="nav-name">饭太硬</div>
  </div>
  <div class="nav-item" onclick="copyLink('君子兰接口地址')">
    <div class="nav-icon" style="background:#ff3388">君</div>
    <div class="nav-name">君子兰</div>
  </div>
  <div class="nav-item" onclick="copyLink('潇洒接口地址')">
    <div class="nav-icon" style="background:#ff9900">潇</div>
    <div class="nav-name">潇洒</div>
  </div>
  <div class="nav-item" onclick="copyLink('摸鱼接口地址')">
    <div class="nav-icon" style="background:#ffdd00">摸</div>
    <div class="nav-name">摸鱼</div>
  </div>
  <div class="nav-item" onclick="copyLink('王二小接口地址')">
    <div class="nav-icon" style="background:#bbee22">王</div>
    <div class="nav-name">王二小</div>
  </div>
  <div class="nav-item" onclick="copyLink('影视仓接口地址')">
    <div class="nav-icon" style="background:#22dd66">影</div>
    <div class="nav-name">影视仓</div>
  </div>
  <div class="nav-item" onclick="copyLink('巧技接口地址')">
    <div class="nav-icon" style="background:#0077cc">巧</div>
    <div class="nav-name">巧技</div>
  </div>
  <div class="nav-item" onclick="copyLink('点播接口地址')">
    <div class="nav-icon" style="background:#bbbbbb">点</div>
    <div class="nav-name">点播</div>
  </div>
  <div class="nav-item" onclick="copyLink('宝盒接口地址')">
    <div class="nav-icon" style="background:#999999">宝</div>
    <div class="nav-name">宝盒</div>
  </div>
</div>

<!-- 底部分类标签 -->
<div class="tab-wrap">
  <div class="tab-list">
    <div class="tab-item active">影视接口</div>
    <div class="tab-item">聚合源</div>
    <div class="tab-item">直播源</div>
    <div class="tab-item">工具</div>
    <div class="tab-item">设置</div>
  </div>
</div>

<script>
// 搜索功能
function doSearch(){
  let kw = document.getElementById("kwInput").value.trim();
  let eng = document.getElementById("engineSel").value;
  if(!kw) return alert("请输入搜索关键词");
  let url = eng === "baidu" 
    ? `https://www.baidu.com/s?wd=${encodeURIComponent(kw)}`
    : `https://cn.bing.com/search?q=${encodeURIComponent(kw)}`;
  window.open(url,"_blank");
}
document.getElementById("kwInput").addEventListener("keydown",e=>e.key==="Enter"&&doSearch())

// 复制接口功能，把引号内替换成你的真实接口链接
function copyLink(url){
  navigator.clipboard.writeText(url).then(()=>alert("复制成功："+url))
}
</script>
</body>
</html>
