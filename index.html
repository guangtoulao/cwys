<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif;}
body{
    /* 全屏风景背景URL */
    background-image: url("https://cwys.qzz.io//icons/桌面.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    padding:40px 20px;
    /* 删掉max-width，背景完整铺满屏幕 */
    min-height: 100vh;
}
.box-wrap{
    background:rgba(255,255,255,0.6); /* 半透明白框，透出背景 */
    border-radius:14px;
    padding:24px;
    margin-bottom:32px;
    max-width:1100px; /* 仅内容框窄居中，不限制背景 */
    margin-left:auto;
    margin-right:auto;
}
/* 搜索框：缩短、居中、加大下方间距 */
.search-wrap{
    display:flex;
    align-items:center;
    padding:16px 20px;
    gap:12px;
    margin-bottom:40px;
    background:#f3f5f9;
    border-radius:12px;
    max-width:700px;
    margin-left:auto;
    margin-right:auto;
}
.search-input{
    flex:1;
    border:none;
    outline:none;
    font-size:16px;
    padding:8px 10px;
    background:transparent;
}
.search-btn{
    background:#3b6ef7;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
    padding:9px 24px;
    cursor:pointer;
}
/* 自适应网格，自动分配列，和参考图图标排布一致 */
.icon-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap:18px;
}
.icon-card{
    text-align:center;
    cursor:pointer;
}
.icon-img{
    width:48px;
    height:48px;
    border-radius:8px;
    object-fit:cover;
    margin-bottom:8px;
}
.icon-text{
    font-size:13px;
    color:#222;
    line-height:1.3;
}
/* 底部分类标签栏 */
.tab-bar{
    display:flex;
    gap:36px;
    border-bottom:1px solid #eee;
    padding-bottom:12px;
    margin-bottom:24px;
    overflow-x:auto;
}
.tab-item{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:18px;
    color:#555;
    padding:8px 0;
    cursor:pointer;
    position:relative;
    white-space:nowrap;
}
.tab-item.active::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-13px;
    width:100%;
    height:3px;
    background:#32c870;
}
.tab-item.active{
    color:#000;
}
.tab-icon{
    font-size:20px;
}
.category-icon-box{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap:18px;
}
</style>

<script>
const groupData = {
    video: [
        {name:"腾讯视频", img:"https://cwys.qzz.io/icons/tencentvideo.png", link:"https://v.qq.com"},
        {name:"爱奇艺", img:"https://cwys.qzz.io/icons/iqiyi.png", link:"https://iqiyi.com"},
        {name:"哔哩哔哩", img:"https://cwys.qzz.io/icons/bilibili.png", link:"https://bilibili.com"}
    ],
    shop: [
        {name:"淘宝", img:"https://cwys.qzz.io/icons/taobao.png", link:"https://taobao.com"},
        {name:"京东", img:"https://cwys.qzz.io/icons/jd.png", link:"https://jd.com"},
        {name:"拼多多", img:"https://cwys.qzz.io/icons/pinduoduo.png", link:"https://pinduoduo.com"}
    ],
    app: [
        {name:"抖音", img:"https://cwys.qzz.io/icons/douyin.png", link:"https://douyin.com"}
    ]
};
function renderCat(key){
    const wrap = document.getElementById("categoryWrap");
    const arr = groupData[key];
    let html = "";
    arr.forEach(item=>{
        html += `
        <div class="icon-card" onclick="openUrl('${item.link}')">
            <img class="icon-img" src="${item.img}" alt="${item.name}">
            <div class="icon-text">${item.name}</div>
        </div>
        `;
    })
    wrap.innerHTML = html;
}
const tabs = document.querySelectorAll(".tab-item");
tabs.forEach(t=>{
    t.onclick = ()=>{
        tabs.forEach(i=>i.classList.remove("active"));
        t.classList.add("active");
        renderCat(t.dataset.key);
    }
})
renderCat("video");
function openUrl(url){
    if(!url) return;
    window.open(url,"_blank");
}
function search(){
    let val = document.getElementById("kw").value.trim();
    if(!val) return alert("请输入关键词");
    window.open(`https://www.baidu.com/s?wd=${encodeURIComponent(val)}`,"_blank");
}
document.getElementById("kw").addEventListener("keydown",e=>e.key=="Enter"&&search())
</script>
