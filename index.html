<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
const ua = navigator.userAgent;
if(ua.includes('okhttp')){
    // TVBox访问的时候，自动去加载你的api.json的内容，然后原封不动输出
    // 你改api.json的时候，这里自动加载最新的，不用改这个文件
    fetch('./api.json')
    .then(res=>res.text())
    .then(text=>{
        document.write(text);
        document.contentType = 'application/json';
    });
}else{
    // 浏览器访问的时候，自动跳转到fty.xxooo.cf
    window.location.href='https://fty.xxooo.cf/';
}
</script>
</head>
</html>
