<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>君子兰主页</title>
<meta http-equiv="Cache-Control" content="public, max-age=2592000">
<script src="./icon/iconfont.js"></script>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui, sans-serif;
}
body{
    background-image: url("./icons/桌面.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    padding:40px 20px;
    min-height: 100vh;
}
.box-wrap{
    background:rgba(255,255,255,0.6);
    border-radius:14px;
    padding:24px 24px 36px 24px;
    margin-bottom:32px;
    max-width:900px;
    margin-left:auto;
    margin-right:auto;
}
.search-wrap{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:8px 20px;
    gap:10px;
    margin-bottom:80px;
    background:#f3f5f9;
    border-radius:12px;
    max-width:700px;
    margin:0 auto;
}
.search-input{
    flex:1;
    max-width:450px;
    border:none;
    outline:none;
    font-size:16px;
    padding:10px 14px;
    background:transparent;
}
.search-btn{
    background:#3967FF;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
    padding:10px 26px;
    cursor:pointer;
}
.api-box{
    margin-bottom:60px;
}
.api-title{
    font-size:20px;
    margin-top:60px;
    margin-bottom:32px;
    color:#3967FF;
    text-align:center;
}
.api-grid{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:14px 14px;
    max-width:820px;
    margin: 0 auto;
}
.api-item{
    text-align:center;
    cursor:pointer;
    padding:12px 6px;
    border-radius:12px;
    background:rgba(255,255,255,0.4);
    transition: all 0.25s ease;
}
.api-item:hover{
    background: var(--randColor);
    transform: scale(1.02);
    box-shadow: 0 0 12px rgba(0,0,0,0.15);
}
.api-item:hover .api-name{
    color:#fff;
}
.api-item:hover .api-line{
    display: none;
}
.api-name{
    font-size:16px;
    margin-bottom:6px;
    color:#111;
}
.api-line{
    height:4px;
    border-radius:88px;
    display:block;
    width:65%;
    margin:6px auto 0;
    transition: all 0.25s ease;
}
.icon-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
    gap:14px 14px;
    max-width:820px;
    margin:0 auto;
}
.icon-card{
    text-align:center;
    cursor:pointer;
    padding:4px;
    border-radius:10px;
    transition:0.2s;
}
.icon-card:hover{
    background:rgba(0,0,0,0.08);
}
.icon {
    width: 44px;
    height: 44px;
    display: block;
    margin: 0 auto 6px;
}
.icon use {
    transform: scale(0.85);
    transform-origin: center;
}
.icon-img {
    width: 44px;
    height: 44px;
    object-fit: contain;
    margin-bottom: 6px;
}
.icon-text{
    font-size:12px;
    color:#222;
    line-height:1.3;
}
</style>
</head>

<script>
// 悬浮随机变色
function setRandomColor(el){
    let r = Math.floor(Math.random() * 256);
    let g = Math.floor(Math.random() * 256);
    let b = Math.floor(Math.random() * 256);
    el.style.setProperty('--randColor', `rgb(${r},${g},${b})`);
}
// 点击直接弹窗显示链接，无复制拦截，100%弹出
function copyText(el){
    const text = el.getAttribute("data-copy");
    alert("接口地址：\n" + text);
}
// 新标签打开网页
function openUrl(url){
    if(!url) return;
    window.open(url,"_blank");
}
// 百度搜索
function search(){
    let val = document.getElementById("kw").value.trim();
    if(!val) return alert("请输入搜索关键词");
    window.open(`https://www.baidu.com/s?wd=${encodeURIComponent(val)}`,"_blank");
}
// 回车搜索
document.getElementById("kw").addEventListener("keydown", function(e){
    if(e.key === "Enter") search();
})
</script>
