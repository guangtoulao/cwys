    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #000;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }
        /* 动态背景的画布，放在最底层 */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1; /* 内容放在背景上面 */
        }
        .title {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }
        .title h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .title p {
            color: #aaa;
            font-size: 1.1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }
        .card {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 16px;
            border-radius: 12px;
            transition: background 0.2s, transform 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }
        .card:hover {
            background: rgba(255,255,255,0.08);
            transform: translateY(-2px);
        }
        .icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            background:#222;
        }
        .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .content {
            flex: 1;
            padding-top: 4px;
        }
        .name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: white;
        }
        .desc {
            font-size: 0.95rem;
            color: #aaa;
            line-height: 1.5;
        }

        @media (max-width: 992px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .title h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

    <!-- 动态粒子背景的JS代码 -->
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let lines = [];
        const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7', '#dfe6e9', '#fd79a8', '#a29bfe', '#81ecec', '#55efc4'];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Line {
            constructor() {
                this.x = Math.random() * width;
                this.y = height;
                this.speed = 2 + Math.random() * 4;
                this.angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.8;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.width = 2 + Math.random() * 2;
                this.length = 50 + Math.random() * 100;
            }

            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(
                    this.x + Math.cos(this.angle) * this.length,
                    this.y + Math.sin(this.angle) * this.length
                );
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.width;
                ctx.globalAlpha = 0.7;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            if(Math.random() < 0.5) {
                lines.push(new Line());
            }

            lines = lines.filter(line => {
                line.update();
                line.draw();
                return line.y > -line.length;
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
