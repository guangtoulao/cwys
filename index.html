<!DOCTYPE html>
<html lang="zh-CN">
<head>

<style>
/* 全局通用重置样式 */
*{
    margin:0;                     /* 【可修改4】全局外边距重置数值 */
    padding:0;                    /* 【可修改5】全局内边距重置数值 */
    box-sizing:border-box;        /* 固定盒模型，不建议修改 */
    font-family:system-ui, sans-serif;  /* 【可修改6】全局页面字体 */
    color:#fff;                   /* 【可修改7】全局默认文字颜色 */
}
/* 页面整体主体容器 */
body{
    padding:40px 20px;            /* 【可修改8】页面上下、左右留白 */
    min-height: 100vh;            /* 固定铺满屏幕高度 */
}

/* ==========顶部搜索框区域 开始========== */
.search-wrap{
    display:flex;                 
    align-items:center;           
    justify-content: space-between;       
    padding:5px 20px;              /* 【可修改9】搜索框上下、左右内边距 */
    gap:0;                         /* 【可修改10】搜索框内部元素间距 */
    margin-top: 0;                 /* 【可修改11】搜索框上方外边距 */
    margin-right: auto;
    margin-bottom: 80px;           /* 【可修改12】搜索框底部外边距 */
    margin-left: auto;
    background:#f3f5f9;           /* 【可修改13】搜索框背景颜色 */
    border-radius:12px;            /* 【可修改14】搜索框圆角大小 */
    max-width:700px;               /* 【可修改15】搜索框最大宽度 */
}
.left-box{
    display:flex;
    align-items:center;
    gap:0;                         /* 【可修改16】放大镜与输入框间距 */
    flex:1;                        /* 输入框自动占剩余宽度，固定 */
}
.search-input{
    flex:1;                        /* 自适应宽度，固定 */
    max-width:450px;               /* 【可修改17】输入框最大宽度 */
    border:none;                  
    outline:none;                 
    font-size:16px;                /* 【可修改18】输入文字字号 */
    padding:10px 0;                /* 【可修改19】输入框上下内边距 */
    background:transparent;       
    text-align: left;             
    color:#333;                    /* 【可修改20】输入框文字颜色 */
}
.search-btn{
    background:#3967FF;          /* 【可修改21】搜索按钮背景色 */
    color:#fff;                    /* 【可修改22】按钮文字颜色 */
    border:none;                  
    border-radius:8px;             /* 【可修改23】按钮圆角 */
    font-size:16px;                /* 【可修改24】按钮文字字号 */
    padding:10px 26px;             /* 【可修改25】按钮上下、左右内边距 */
    cursor:pointer;               
}
/* ==========顶部搜索框区域 结束========== */

/* ==========中间问候语彩虹闪光文字 开始========== */
.greet-text{
    max-width:1000px;              /* 【可修改26】文字区块最大宽度 */
    margin:0 auto 40px;            /* 【可修改27】区块底部外边距 */
    text-align:center;            
    font-size:45px;                /* 【可修改28】问候文字字号 */
    font-weight:bold;              
    letter-spacing:29px;            /* 【可修改29】文字字间距 */
}
.flash-text{
    display:inline-block;
    margin:0 50px;                 /* 【可修改30】两段文字左右间距 */
    background:linear-gradient(90deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #9900ff, #ff0000);
    background-size:400% 100%;     /* 【可修改31】渐变拉伸倍数 */
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;            
    animation:rainbowFlash 4s linear infinite; /* 【可修改32】彩虹动画循环时长 */
    text-shadow:0 0 8px rgba(255,255,255,0.6); /* 【可修改33】文字发光模糊大小、透明度 */
}
@keyframes rainbowFlash{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
/* ==========中间问候语彩虹闪光文字 结束========== */

/* ==========接口板块按钮区域 开始========== */
.api-box{
    margin-bottom: 80px;           /* 【可修改34】接口板块底部外边距 */
}
.api-title{
    font-size:20px;                /* 【可修改35】接口标题文字大小 */
    margin-top:60px;               /* 【可修改36】标题上方外边距 */
    margin-bottom:32px;            /* 【可修改37】标题下方外边距 */
    color:#3967FF;                /* 【可修改38】标题文字颜色 */
    text-align:left;              
}
.api-grid{
    display:grid;                                      
    grid-template-columns: repeat(3, 1fr);              /* 【可修改39】一行展示按钮数量，修改数字即可 */
    max-width: 1000px;              /* 【可修改40】按钮网格最大宽度 */
    margin:0 auto;                                     
    column-gap: 24px;               /* 【可修改41】按钮横向间距 */
    row-gap: 20px;                  /* 【可修改42】按钮纵向间距 */
}
.api-item{
    text-align:center;            
    cursor:pointer;               
    padding:30px 0;                /* 【可修改43】按钮上下内边距 */
    border-radius:6px;              /* 【可修改44】按钮圆角 */
    transition: all 0.25s ease;    /* 【可修改45】鼠标悬浮过渡动画时长 */
    position:relative;            
    color:#ffffff;                
    font-size:22px;                /* 【可修改46】按钮文字字号 */
    width:100%;
    box-sizing:border-box;
}
.api-item .text-word{
    position:absolute;
    left:0;
    right:0;
    text-align:center;
    top:12px;                      /* 【可修改47】按钮文字距离顶部偏移距离 */
}
.api-item:hover{
    background: var(--randColor); 
    transform: scale(1.02);        /* 【可修改48】悬浮放大比例 */
}
.api-item:hover .api-line{
    display: none;
}
.api-line{
    position:absolute;
    left:0;
    bottom:0;
    width: 100%;
    height: 2px;                   /* 【可修改49】按钮底部线条粗细 */
    border-radius: 0;
    display:block;
}
/* ==========接口板块按钮区域 结束========== */

/* ==========图标导航网格区域 开始========== */
.icon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); /* 【可修改50】图标格子最小宽度 */
    gap: 30px 16px; /* 【可修改51】图标纵向间距 | 【可修改52】图标横向间距 */
    margin: 0;
    width: 100%;
}
.icon-card{
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    text-align:center;            
    cursor:pointer;               
    padding:2px; /* 【可修改53】图标卡片内部留白 */
    border-radius:10px; /* 【可修改54】卡片圆角数值，越大越圆润 */
    transition:0.2s; /* 【可修改55】鼠标悬浮动画过渡时长(秒) */
    width: 100%;
    min-height: 90px; /* 【可修改56】图标卡片最小高度 */
}
.icon-card:hover{
    background:rgba(0,0,0,0.08); /* 【可修改57】悬浮背景透明度，0完全透明 1纯黑 */
}

/* 【修改完成】新增独立图标容器，图标与文字完全分层隔离，对标AItab规范 */
.icon-card .img {
    width: 44px; /* 基准固定宽高，统一所有图标外框尺寸 */
    height: 44px;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin: 0 auto 6px; /* 图标与下方文字垂直间距 */
    border-radius: 8px;
    overflow: hidden; /* 裁切超出容器的图标边缘，保证外框规整 */
    background: rgba(255,255,255,0.12);
}

/* 【修改完成】阿里矢量SVG图标统一填充规则，取消缩小留白 */
.icon-card .img .icon {
    width: 100%;
    height: 100%;
    fill: #ffffff; /* 【可修改61】阿里SVG图标填充颜色 */
    color: #ffffff;/* 【可修改62】FA字体图标颜色 */
    font-size: 44px;/* 【可修改63】FA字体图标尺寸 */
}
.icon-card .img .icon use {
    transform: scale(1); /* 取消原有0.85缩小，原生尺寸填满容器 */
    transform-origin: center;
}

/* 【修改完成】外部图片PNG/JPG专属缩放，抵消图片自带透明留白，和SVG视觉等大 */
.icon-card .img img {
    width: 110%;
    height: 110%;
    object-fit: contain; /* 不变形完整展示，仅放大填充空白 */
}

/* 【修改完成】独立文字容器，只控制文字样式，与图标容器完全分离 */
.icon-card .icon-text {
    font-size: 14px;
    text-align: center;
}

/* ==========图标导航网格区域 结束========== */

/* ==========顶部分类导航栏 开始========== */
.tab-nav {
    display: flex;
    justify-content: flex-start;
    gap: 60px; /* 【可修改65】生活/办公/接口 文字之间横向间隔 */

    max-width: 1000px; /* 【可修改67】标签栏整体最大宽度，和图标容器保持一致 */
    padding: 10px 0 8px; /* 【可修改68】标签栏上下内边距 */
    padding-left: 0; /* 【可修改69】标签文字整体左侧内偏移，会同步带动底部黑线 */
    padding-right: 0; /* 【可修改70】标签文字整体右侧内偏移 */
    border-bottom: 1px solid #333; /* 【可修改71】底部黑线粗细、颜色 */
    margin-left: 130px; /* 【可修改72】整块标签栏左右偏移，只移动文字+黑线，不影响下方图标 */
}
.tab {
    flex: none;
    width: fit-content;
    text-align: left;
    font-weight: 400; /* 【可修改73】文字字重，400常规 700加粗 */
    padding: 10px 0; /* 【可修改74】单个文字上下内边距 */
    font-size: 26px; /* 【可修改75】分类文字字号大小 */
    cursor: pointer;
    color: #fff; /* 【可修改76】文字颜色 */
    position: relative;
}
.tab.active::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -8px; /* 【可修改77】蓝色下划线距离文字底部距离 */
    width: 100%;
    height: 3px; /* 【可修改78】蓝色激活下划线粗细 */
    background-color: #00aaff; /* 【可修改79】激活下划线颜色 */
}

/* 分类内容外层容器 */
.tab-content-item {
    display: none;
    width: 1000px; /* 【可修改80】图标区块整体宽度，需和tab-nav max-width统一 */
    margin: 0 auto;
}
.tab-content-item.active {
    display: block;
}

/* 图标网格（重复定义，覆盖上层） */
.icon-grid {

}
/* ==========顶部分类导航栏 结束========== */

/* ==========复制成功弹窗提示框 开始========== */
.tip-box{
    position: fixed;
    left: 50%;
    top: 30%;                      /* 【可修改84】弹窗垂直距离顶部百分比 */

    z-index: 9999;                 /* 最高层级，不建议修改 */
}
/* ==========复制成功弹窗提示框 结束========== */
</style>
</head>
<body>

<script>
let bgType = 1; // 【可修改88】0=静态背景图，1=动态星空背景
let onlineBg = "https://img2.baidu.com/it/u=2956805492,2882898&fm=253&fmt=auto?w=1280&h=800"; /* 【可修改89】静态背景图片链接 */

// 先删除残留星空画布，防止重叠
const oldCanvas = document.querySelector("canvas");
if(oldCanvas) oldCanvas.remove();

if(bgType === 0){
    // 只加载静态图，不创建星空
    document.body.style.background = `url(${onlineBg}) center/cover fixed`;
}else{
    // 仅bgType=1时才生成星空
    const canvas = document.createElement("canvas");
    document.body.appendChild(canvas);
    const ctx = canvas.getContext("2d");
    canvas.style.position = "fixed";
    canvas.style.top = 0;
    canvas.style.left = 0;
    canvas.style.zIndex = "-1";

    function resize(){
        canvas.width = innerWidth;
        canvas.height = innerHeight;
    }
    resize();
    window.onresize = resize;

    let dots = [];
    for(let i = 0; i < 200; i++){ /* 【可修改90】星空星星总数量 */
        dots.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.5, /* 【可修改91】星星最大半径 */
            speedX: (Math.random() - 0.5) * 0.3, /* 【可修改92】星星横向移动速度 */
            speedY: (Math.random() - 0.5) * 0.3 /* 【可修改93】星星纵向移动速度 */
        })
    }

    function run(){
        ctx.fillStyle = "rgba(0,0,0,0.15)"; /* 【可修改94】星空拖尾透明度 */
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        dots.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
            p.x += p.speedX;
            p.y += p.speedY;
            if(p.x < 0) p.x = canvas.width;
            if(p.x > canvas.width) p.x = 0;
            if(p.y < 0) p.y = canvas.height;
            if(p.y > canvas.height) p.y = 0;
        })
        requestAnimationFrame(run);
    }
    run();
}

function setRandomColor(el){
    let r = Math.floor(Math.random() * 256);
    let g = Math.floor(Math.random() * 256);
    let b = Math.floor(Math.random() * 256);
    el.style.setProperty('--randColor', `rgb(${r},${g},${b})`);
}

function copyText(el) {
  let txt = el.dataset.copy;
  const temp = document.createElement('textarea');
  temp.value = txt;
  document.body.appendChild(temp);
  temp.select();
  document.execCommand('copy');
  document.body.removeChild(temp);

  const box = document.createElement('div');
  box.className = "tip-box";
  box.innerText = "复制成功\n祝您观影愉快！";
  document.body.appendChild(box);
  setTimeout(() => box.remove(), 1500); /* 【可修改95】弹窗停留毫秒数 */
}

function openUrl(url){
    if(!url) return;
    window.open(url,"_blank");
}

function search(){
    let val = document.getElementById("kw").value.trim();
    if(!val) return alert("请输入搜索关键词");
    window.open(`https://www.baidu.com/s?wd=${encodeURIComponent(val)}`,"_blank");
}

// ========== 分类切换逻辑（保留不变） ==========
const tabs = document.querySelectorAll('.tab');
const tabItems = document.querySelectorAll('.tab-content-item');
tabs.forEach(tab=>{
    tab.onclick = ()=>{
        const targetId = tab.dataset.target;
        tabs.forEach(t=>t.classList.remove('active'));
        tabItems.forEach(item=>item.classList.remove('active'));
        tab.classList.add('active');
        document.querySelector(`.tab-content-item[data-id="${targetId}"]`).classList.add('active');
    }
})

// 渲染函数：传入容器ID、数组自动生成卡片
function renderGrid(boxId, dataList){
    const box = document.getElementById(boxId);
    let htmlStr = "";
    dataList.forEach(item=>{
        // 判断使用svg还是img
        let iconHtml = "";
        if(item.iconId){
            iconHtml = `<svg class="icon" aria-hidden="true"><use xlink:href="#${item.iconId}"></use></svg>`;
        }else if(item.imgSrc){
            iconHtml = `<img class="icon" src="${item.imgSrc}" alt="${item.name}">`;
        }
        // 拼接单张卡片完整代码
        htmlStr += `
            <div class="icon-card" onclick="openUrl('${item.url}')">
                <div class="img">
                    ${iconHtml}
                </div>
                <div class="icon-text">${item.name}</div>
            </div>
        `;
    })
    box.innerHTML = htmlStr;
}
