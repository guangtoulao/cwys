<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif;}
body{
    /* 全屏风景背景URL */
    background-image: url("https://cwys.qzz.io/icons/桌面.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    padding:40px 20px;
    min-height: 100vh;
}
.box-wrap{
    background:rgba(255,255,255,0.6); /* 半透明白框，透出背景 */
    border-radius:14px;
    padding:24px;
    margin-bottom:32px;
    max-width:1100px; /* 仅内容框窄居中，不限制背景 */
    margin-left:auto;
    margin-right:auto;
}
/* 搜索框：缩短、居中、加大下方间距 */
.search-wrap{
    display:flex;
    align-items:center;
    padding:16px 20px;
    gap:12px;
    margin-bottom:40px;
    background:#f3f5f9;
    border-radius:12px;
    max-width:700px;
    margin-left:auto;
    margin-right:auto;
}
.search-input{
    flex:1;
    border:none;
    outline:none;
    font-size:16px;
    padding:8px 10px;
    background:transparent;
}
.search-btn{
    background:#3b6ef7;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
    padding:9px 24px;
    cursor:pointer;
}
/* 自适应网站图标网格 */
.icon-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap:18px;
}
.icon-card{
    text-align:center;
    cursor:pointer;
}
.icon-img{
    width:48px;
    height:48px;
    border-radius:8px;
    object-fit:cover;
    margin-bottom:8px;
}
.icon-text{
    font-size:13px;
    color:#222;
    line-height:1.3;
}
/* 底部分类标签栏 */
.tab-bar{
    display:flex;
    gap:36px;
    border-bottom:1px solid #eee;
    padding-bottom:12px;
    margin-bottom:24px;
    overflow-x:auto;
}
.tab-item{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:18px;
    color:#555;
    padding:8px 0;
    cursor:pointer;
    position:relative;
    white-space:nowrap;
}
.tab-item.active::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-13px;
    width:100%;
    height:3px;
    background:#32c870;
}
.tab-item.active{
    color:#000;
}
.tab-icon{
    font-size:20px;
}
/* TVBOX接口网格样式 */
.category-icon-box{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap:18px;
}
.api-item{
    background:rgba(255,255,255,0.85);
    border-radius:10px;
    padding:16px 10px;
    text-align:center;
    cursor:pointer;
}
.api-name{
    font-size:15px;
    margin-bottom:8px;
}
.api-line{
    height:4px;
    border-radius:2px;
}
</style>

// 仅保留tvbox接口分组，删除旧示例数据

    tvbox: [
        {name:"饭太硬", copy:"http://fty.xxooo.cf/tv", lineColor:"#3498db"},
        {name:"君子兰", copy:"https://cwys.qzz.io/api.json", lineColor:"#e84393"},

        {name:"哔哩哔哩", img:"https://cwys.qzz.io/icons/bilibili.png", link:"https://bilibili.com"}],
    shop: [  {name:"淘宝", img:"https://cwys.qzz.io/icons/taobao.png", link:"https://taobao.com"},
        {name:"京东", img:"https://cwys.qzz.io/icons/jd.png", link:"https://jd.com"},
        {name:"拼多多", img:"https://cwys.qzz.io/icons/pinduoduo.png", link:"https://pinduoduo.com"}],
    app: [ {name:"接口解密", img:"https://cwys.qzz.io/icons/加密解密.png", link:"https://www.qiushui.vip/gj/jiemi/"},
        {name:"影视仓", img:"https://cwys.qzz.io/icons/%E5%BD%B1%E8%A7%86%E4%BB%93.png", link:"https://pan.quark.cn/s/0c47dfe3a371#/list/share/c1ac3b5d9d0440b591e5984af370e593"}]
};

// 渲染TVBOX接口卡片，点击复制链接
function renderCat(key){
    const wrap = document.getElementById("categoryWrap");
    const arr = groupData[key];
    if(arr.length === 0){
        wrap.innerHTML = "<div style='grid-column:1/-1;text-align:center;padding:30px;color:#666'>暂无内容</div>";
        return;
    }
    let html = "";
    arr.forEach(item=>{
        html += `
        <div class="api-item" data-copy="${item.copy}" onclick="copyText('${item.copy}')">
            <div class="api-name">${item.name}</div>
            <div class="api-line" style="background: ${item.lineColor};"></div>
        </div>
        `;
    })
    wrap.innerHTML = html;
}

// 复制链接函数
function copyText(text){
    navigator.clipboard.writeText(text).then(()=>{
        alert("已复制接口："+text);
    }).catch(()=>{
        alert("复制失败，请手动复制："+text);
    })
}

// 切换标签
const tabs = document.querySelectorAll(".tab-item");
tabs.forEach(t=>{
    t.onclick = ()=>{
        tabs.forEach(i=>i.classList.remove("active"));
        t.classList.add("active");
        renderCat(t.dataset.key);
    }
})
// 默认加载tvbox接口分类
renderCat("tvbox");

// 新窗口打开网站链接
function openUrl(url){
    if(!url) return;
    window.open(url,"_blank");
}
// 顶部百度搜索
function search(){
    let val = document.getElementById("kw").value.trim();
    if(!val) return alert("请输入关键词");
    window.open(`https://www.baidu.com/s?wd=${encodeURIComponent(val)}`,"_blank");
}
document.getElementById("kw").addEventListener("keydown",e=>e.key=="Enter"&&search())
</script>
