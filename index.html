<style>
*{
    margin:0;                     /* 清除所有元素默认外边距 */
    padding:0;                    /* 清除所有元素默认内边距 */
    box-sizing:border-box;        /* 内边距不会撑大盒子总宽度 */
    font-family:system-ui, sans-serif;  /* 全局统一字体 */
}
/* 页面整体边距控制 */
body{
    padding:40px 20px;            /* 页面上下留白40px，左右留白20px */
    min-height: 100vh;            /* 页面高度铺满整个浏览器窗口 */
}
/* 顶部搜索框整体样式 */
.search-wrap{
    display:flex;                 /* 开启弹性布局，横向排列内部元素 */
    align-items:center;           /* 内部元素垂直居中对齐 */
    justify-content: space-between;       /* 内部元素两端对齐 */
    padding:5px 20px;             /* 搜索框内部上下内边距5px，左右20px */
    gap:0;                        /*————【改动】清除项目之间的间距————*/
    margin-bottom:80px;           /* 搜索框和下方标题之间的垂直距离 */
    background:#f3f5f9;           /* 搜索框背景颜色 */
    border-radius:12px;           /* 搜索框四个角的圆角大小 */
    max-width:700px;              /* 搜索框整体最大宽度 */
    margin:0 auto;                /* 让搜索框整体在页面水平居中 */
}
.left-box{                         /*————【新增】包裹放大镜与输入框————*/
    display:flex;
    align-items:center;
    gap:0;                        /*————【改动】图标与输入框无空隙————*/
    flex:1;
}
.search-input{
    flex:1;                       /* 自动填满剩余宽度 */
    max-width:450px;              /* 限制输入框最大宽度 */
    border:none;                  /* 清除边框 */
    outline:none;                 /* 取消选中高亮 */
    font-size:16px;               /* 文字字号 */
    padding:10px 0;               /*————【改动】左右内边距清零————*/
    background:transparent;       /* 背景透明 */
    text-align: left;             /* 文字左对齐 */
}
/* 搜索按钮样式 */
.search-btn{
    background:#3967FF;          /* 按钮背景颜色 */
    color:#fff;                   /* 按钮文字颜色为白色 */
    border:none;                  /* 清除按钮默认边框 */
    border-radius:8px;            /* ★按钮四个角圆角大小，数值越大圆角越圆润 */
    font-size:16px;               /* ★按钮内部文字字号大小 */
    padding:10px 26px;            /* ★按钮上下内边距10px（控制按钮高度），左右内边距26px（控制按钮宽度） */
    cursor:pointer;               /* 鼠标悬浮到按钮上时，光标变成小手样式 */
}
/* 彩条模块和下方图标区的间距 */
.api-box{
    /*————————改动1：把上下间距写在这里，不破坏网格布局————————*/
    margin-bottom: 80px;
}
/* tvbox标题文字样式 */
.api-title{
    font-size:20px;               /* 标题文字字号大小 */
    margin-top:60px;              /* 标题上方与上方内容的空白距离 */
    margin-bottom:32px;           /* 标题与下方彩条区域之间的空白距离 */
    color:#3967FF;                /* 标题文字颜色 */
    text-align:center;            /* 标题文字水平居中 */
}
/* =====================彩条整体布局控制区===================== */
.api-grid{
    display:grid;                                      /* 开启网格布局，实现多栏排版 */
    grid-template-columns: repeat(3, 1fr);             /* 固定一行显示3个栏目，均分宽度，不要修改 */
    max-width: 1000px;                                 /* 整排按钮整体最大宽度，数值越大整排越长 */
    margin:0 auto;                                     /* 让整排按钮在页面水平居中 */
    /*————————改动2：已彻底删除justify-items居中代码，还原原生自动换行，解决第三行留白————————*/
    column-gap: 24px;                                  /* ★左右三组按钮之间的横向空隙，数字越大中间空白越宽 */
    row-gap: 20px;                                     /* ★上下两行按钮的垂直间距，数值越大两行分得越开 */
}
.item-text{
    margin-bottom:300px;
}
/* 单个文字按钮容器（完全保持原样，悬浮色块不会变形、不会下移） */
.api-item{
    text-align:center;            /* 内部文字水平居中 */
    cursor:pointer;               /* 鼠标移入变成小手光标 */
    padding:30px 0;               /* 固定原值，悬浮色块高度锁定，禁止修改这一行 */
    border-radius:6px;            /* 悬浮色块圆角大小 */
    transition: all 0.25s ease;   /* 悬浮缩放动画 */
    position:relative;            /* 横线定位基准 */
    color:#ffffff;                /* 文字颜色白色 */
    font-size:22px;               /* 文字字号 */
    width:100%;
    box-sizing:border-box;
}

/* 只移动文字，色块、横线全程固定不动 */
.api-item .text-word{
    position:absolute;
    left:0;
    right:0;
    text-align:center;
    top:12px;
}
/* 鼠标悬浮按钮样式 */
.api-item:hover{
    background: var(--randColor); /* 悬浮时填充随机彩色背景 */
    transform: scale(1.02);       /* 悬浮时按钮轻微放大 */
}
/* 鼠标悬浮时隐藏下方彩色横线 */
.api-item:hover .api-line{
    display: none;                /* 悬浮把横条隐藏 */
}
/* 底部彩色横条样式 */
.api-line{
    position:absolute;            /* 绝对定位，脱离普通文档流，横线不会跟着盒子高度上下乱跑 */
    left:0;                       /* 横条靠左对齐 */
    bottom:0;                     /* 横条永久固定在盒子最底部，所有横条保持同一水平线 */
    width: 100%;                  /* 横条宽度填满整个按钮宽度 */
    height: 2px;                  /* ★彩色横条自身粗细厚度，只修改这个数字，只改变线条粗细，不会变成大色块 */
    border-radius: 0;             /* 横条直角，无圆角 */
    display:block;                /* 常态强制显示横条 */
}
/* =====================下方图标网格区域（必须和彩条宽度保持一致才能对齐）===================== */
.icon-grid{
    display: grid;                                        /* 开启网格自动排版 */
    grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); /* 图标自动换行，最小宽度90px */
    gap: 30px 16px;                                       /* ★图标上下间距30px，左右间距16px */
    max-width: 1000px;                                    /* 必须和上方.api-grid的max-width数值保持完全一致，保证上下区块左右对齐 */
    margin: 0 auto;                                       /* 图标区域整体水平居中 */
}
/* 单个图标卡片 */
.icon-card{
    text-align:center;            /* 图标与文字居中 */
    cursor:pointer;               /* 鼠标移入显示小手 */
    padding:4px;                  /* 卡片内部留白 */
    border-radius:10px;           /* 卡片圆角大小 */
    transition:0.2s;              /* 悬浮背景变化的动画时长 */
}
/* 图标卡片悬浮效果 */
.icon-card:hover{
    background:rgba(0,0,0,0.08);  /* 悬浮时出现淡淡的灰色底色 */
}
/* SVG图标尺寸 */
.icon {
    width: 44px;                  /* 图标宽度 */
    height: 44px;                 /* 图标高度 */
    display: block;               /* 让图标独占一行，方便居中 */
    margin: 0 auto 6px;           /* 图标水平居中，图标与下方文字留出6px空隙 */
}
/* SVG图标缩放 */
.icon use {
    transform: scale(0.85);      /* 图标整体缩小到85% */
    transform-origin: center;    /* 以图标中心为缩放基准 */
}
/* 图片图标尺寸 */
.icon-img {
    width: 44px;                  /* 图片图标宽度 */
    height: 44px;                 /* 图片图标高度 */
    object-fit: contain;          /* 图片不变形完整显示 */
    margin-bottom: 6px;           /* 图片与下方文字的间距 */
}
/* 图标下方文字 */
.icon-text{
    font-size:12px;               /* ★图标下方文字字号大小 */
    color:#ffffff;                /* 文字白色 */
    line-height:1.3;              /* 文字行高，控制文字上下松紧 */
}
</style>

<script>
let bgType = 0;
let onlineBg = "https://xxx.jpg";

if(bgType === 1){
    document.body.style.background = `url(${onlineBg}) center/cover fixed`;
}else{
    const canvas = document.createElement("canvas");
    document.body.appendChild(canvas);
    const ctx = canvas.getContext("2d");
    canvas.style.position = "fixed";
    canvas.style.top = 0;
    canvas.style.left = 0;
    canvas.style.zIndex = "-1";

    function resize(){
        canvas.width = innerWidth;
        canvas.height = innerHeight;
    }
    resize();
    window.onresize = resize;

    let dots = [];
    for(let i = 0; i < 80; i++){
        dots.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.5,
            speedX: (Math.random() - 0.5) * 0.3,
            speedY: (Math.random() - 0.5) * 0.3
        })
    }

    function run(){
        ctx.fillStyle = "rgba(0,0,0,0.15)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        dots.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
            p.x += p.speedX;
            p.y += p.speedY;
            if(p.x < 0) p.x = canvas.width;
            if(p.x > canvas.width) p.x = 0;
            if(p.y < 0) p.y = canvas.height;
            if(p.y > canvas.height) p.y = 0;
        })
        requestAnimationFrame(run);
    }
    run();
}

function setRandomColor(el){
    let r = Math.floor(Math.random() * 256);
    let g = Math.floor(Math.random() * 256);
    let b = Math.floor(Math.random() * 256);
    el.style.setProperty('--randColor', `rgb(${r},${g},${b})`);
}

function copyText(el) {
  let txt = el.dataset.copy;
  const temp = document.createElement('textarea');
  temp.value = txt;
  document.body.appendChild(temp);
  temp.select();
  document.execCommand('copy');
  document.body.removeChild(temp);

  const box = document.createElement('div');
  box.style.position = 'fixed';
  box.style.left = '50%';
  box.style.top = '28%';
  box.style.transform = 'translate(-50%, -50%)';
  box.style.background = '#ffffff';
  box.style.padding = '12px 20px';
  box.style.borderRadius = '10px';
  box.style.zIndex = '9999';
  box.style.fontSize = '16px';
  box.style.whiteSpace = 'pre-line';
  box.style.textAlign = 'center';
  box.innerText = "复制成功\n祝您观影愉快！";
  document.body.appendChild(box);
  setTimeout(() => box.remove(), 1500);
}

function openUrl(url){
    if(!url) return;
    window.open(url,"_blank");
}

function search(){
    let val = document.getElementById("kw").value.trim();
    if(!val) return alert("请输入搜索关键词");
    window.open(`https://www.baidu.com/s?wd=${encodeURIComponent(val)}`,"_blank");
}

document.getElementById("kw").addEventListener("keydown", function(e){
    if(e.key === "Enter") search();
})
</script>
