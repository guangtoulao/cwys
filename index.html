<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVBox工具导航</title>
    <!-- 引入图标库 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #121212 0%, #1e1e2e 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .title {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }
        .title h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .title p {
            color: #aaa;
            font-size: 1.1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }
        .card {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 16px;
            border-radius: 12px;
            transition: background 0.2s, transform 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }
        .card:hover {
            background: rgba(255,255,255,0.05);
            transform: translateY(-2px);
        }
        .icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 28px;
            color: white;
        }
        .content {
            flex: 1;
            padding-top: 4px;
        }
        .name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: white;
        }
        .desc {
            font-size: 0.95rem;
            color: #aaa;
            line-height: 1.5;
        }
        /* 图标颜色，跟你截图里的对齐了 */
        .icon-wechat { background: #07c160; }
        .icon-daoguan { background: #9c27b0; }
        .icon-wanou { background: #f44336; }
        .icon-decrypt { background: #2196f3; }
        .icon-ibox { background: #00bcd4; }
        .icon-ok { background: #ff9800; }
        .icon-yingcang { background: #ff5722; }
        .icon-taiwan { background: #ff9800; }
        .icon-apple { background: #607d8b; }
        .icon-taiduan { background: #2196f3; }
        .icon-taikuai { background: #3f51b5; }
        .icon-taibian { background: #ff5722; }
        .icon-download { background: #e91e63; }
        .icon-live { background: #f44336; }
        .icon-qiushui { background: #00bcd4; }
        .icon-kaisuu { background: #2196f3; }
        .icon-aida { background: #3f51b5; }
        .icon-search { background: #212121; }
        .icon-convert { background: #ffc107; }
        .icon-hengchuang { background: #2196f3; }

        @media (max-width: 992px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .title h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">

    </div>
</body>
</html>
