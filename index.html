<!DOCTYPE html>
<!-- HTML标准文档声明，固定头部，浏览器识别网页文档类型 -->
<html lang="zh-CN">
<!-- lang="zh-CN" 页面语言声明为简体中文，适配搜索引擎、输入法、屏幕阅读器 -->

<!-- 页面缓存策略：max-age单位秒，2592000=30天，浏览器30天内复用本地缓存，减少重复加载 -->
<!-- 阿里SVG图标JS文件引入，仅Symbol模式可用，ttf/woff字体文件无需引入页面 -->

<style>
/* ========== 全局通配符样式重置，页面所有元素统一基础规则 ========== */
*{
    margin:0; /* 清除全部元素浏览器默认外边距 */
    padding:0; /* 清除全部元素浏览器默认内边距 */
    box-sizing:border-box; /* 标准盒模型：内边距、边框不会撑大盒子设定宽度，布局计算统一 */
    font-family:system-ui, sans-serif; /* 全局无衬线系统字体，Windows/Mac/手机显示风格统一 */
}
body{
    /* 全屏背景图地址，图片失效只需要修改引号内URL */
    background-image: url("https://cwys.qzz.io/icons/桌面.jpg");
    background-size: cover; /* 背景图铺满整个可视区域，无留白、不变形拉伸 */
    background-position: center; /* 背景图片居中对齐 */
    background-attachment: fixed; /* 页面上下滚动时，背景图固定不动，不跟随滚动偏移 */
    padding:40px 20px; /* 页面整体外边距：上下40px 左右20px，控制页面四周留白 */
    min-height: 100vh; /* 页面最小高度等于浏览器可视窗口高度，短页面也撑满全屏 */
}
/* ========== 页面外层总容器 class="box-wrap" 半透明白色包裹所有内容 ========== */
.box-wrap{
    background:rgba(255,255,255,0.6); /* 白色半透明底色，0=完全透明，1=纯白不透明 */
    border-radius:14px; /* 整块容器四角圆角大小，数值越大圆角越圆润 */
    padding:24px 24px 36px 24px; /* 内边距顺序：上 右 下 左，底部36px加大底部留白 */
    margin-bottom:32px; /* 容器距离浏览器底部垂直间距 */
    max-width:900px; /* 容器最大宽度，大屏不会无限拉宽，限制整体页面宽度，视觉协调 */
    margin-left:auto; /* 左侧自动外边距，配合margin-right:auto实现整块水平居中 */
    margin-right:auto; /* 右侧自动外边距 */
}
/* ========== 顶部搜索框模块 class="search-wrap" ========== */
.search-wrap{
    display:flex; /* 弹性横向布局，输入框、按钮并排一行 */
    align-items:center; /* 内部所有元素垂直居中对齐 */
    justify-content:center; /* 整行内容水平居中 */
    padding:12px 20px; /* 搜索框容器内边距：上下12px 左右20px，控制搜索框高度 */
    gap:10px; /* 输入框与搜索按钮之间的水平空隙，数字越大间隔越宽 */
    margin-bottom:80px; /* 搜索框下方外边距，拉开和下方标题距离 */
    background:#f3f5f9; /* 搜索框浅灰底色色值 */
    border-radius:12px; /* 搜索框整体圆角大小 */
    max-width:700px; /* 限制搜索框整体最大宽度，解决原先过宽过长问题 */
    margin:0 auto; /* 搜索框在容器内水平居中 */
}
/* 搜索输入框 class="search-input" */
.search-input{
    flex:1; /* 自动占满容器剩余可用宽度，自适应拉伸 */
    max-width:450px; /* 输入框单独最大宽度，缩短输入框长度 */
    border:none; /* 清除浏览器默认输入框边框 */
    outline:none; /* 清除点击输入框时蓝色高亮边框 */
    font-size:16px; /* 输入框内文字字号大小 */
    padding:10px 14px; /* 输入框文字内边距：上下10px 左右14px */
    background:transparent; /* 输入框背景透明，继承外层search-wrap浅灰色底色 */
}
/* 搜索按钮 class="search-btn" */
.search-btn{
    background:#3967FF; /* 按钮蓝色背景色值 */
    color:#fff; /* 按钮文字纯白色 */
    border:none; /* 清除按钮默认灰色边框 */
    border-radius:8px; /* 按钮四角圆角大小 */
    font-size:16px; /* 按钮文字字号 */
    padding:10px 26px; /* 按钮内边距：上下10px 左右26px，控制按钮宽高 */
    cursor:pointer; /* 鼠标悬浮按钮显示手型光标，提示可点击 */
}

/* ========== TVBOX接口板块外层容器 class="api-box" ========== */
.api-box{
    margin-bottom:60px; /* 拉开接口与下方图标网格垂直空隙 */
}
/* 接口板块标题 class="api-title" 居中+彩色字体 */
.api-title{
    font-size:20px; /* 标题文字字号放大，突出板块标题 */
    margin-top:60px; /* 标题向上空出距离，彻底分开搜索框 */
    margin-bottom:16px; /* 标题文字与下方接口网格垂直间距 */
    color:#3967FF; /* 标题文字蓝色色值 */
    text-align:center; /* 标题文字水平居中对齐 */
}
/* 8个接口方块网格容器 class="api-grid" 强制一行4个，固定布局不错乱 */
.api-grid{
    display:grid; /* 网格布局，实现多方块规整排列 */
    grid-template-columns: repeat(4, 1fr); /* repeat(4,1fr) 固定4列均分宽度，8个方块自动分为两行4+4 */
    gap:14px 14px; /* gap参数：第一个值行上下垂直间距，第二个值方块左右水平间距 */
    max-width:820px; /* 限制接口网格整体宽度，和下方图标网格宽度统一对齐 */
    margin: 0 auto; /* 接口网格在容器内水平居中 */
}
/* 单个接口方块基础样式（删除relative/overflow，解决下方图标错乱） */
.api-item{
    text-align:center;
    cursor:pointer;
    padding:12px 6px;        /* 方块内边距：上下12px 左右6px，控制方块高矮宽窄 */
    border-radius:12px;     /* 方块四角圆角大小，数值越大越圆 */
    background:rgba(255,255,255,0.4); /* 常态半透明白底色，0.4=透明度 */
    transition: all 0.25s ease; /* 悬浮动画切换速度，0.25秒过渡 */
}
/* 鼠标悬浮方块变色放大 */
.api-item:hover{
    background: var(--randColor); /* JS随机生成彩色底色，无需手动修改色值 */
    transform: scale(1.02);  /* 悬浮放大倍数，1=无放大，数值越大放大越明显 */
    box-shadow: 0 0 12px rgba(0,0,0,0.15); /* 悬浮阴影：12px阴影尺寸，0.15阴影透明度 */
}
/* 悬浮文字变白 */
.api-item:hover .api-name{
    color:#fff; /* #fff纯白色文字 */
}
/* 方块内接口名称文字 class="api-name" */
.api-name{
    font-size:16px;         /* 接口文字字号大小 */
    margin-bottom:6px;      /* 文字与下方横线垂直间距，数值越大空隙越大 */
    color:#111;             /* 文字默认深黑色色值 */
}
/* 方块底部彩色分割线 class="api-line" 常态样式 */
.api-line{
    height:4px;             /* 横线粗细高度，数字越大线条越粗 */
    border-radius:88px;     /* 横线两端超大圆角，实现全圆角长条 */
    display:block;
    width:65%;              /* 常态短线宽度，占方块总宽度65%，数值越小线条越短 */
    margin:6px auto 0;      /* 横线顶部外边距6px，auto实现左右居中 */
    transition: all 0.25s ease; /* 线条动画过渡时长 */
}
/* 悬浮直接隐藏线条，色块干净无底边线条 */
.api-item:hover .api-line{
    display: none;
}
/* ========== 下方APP图标网格容器 class="icon-grid" 宽度与接口板块完全统一 ========== */
.icon-grid{
    display:grid; /* 网格布局自动排列图标卡片 */
    grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); /* minmax(75px,1fr) 75px=图标卡片最小宽度，改数字放大缩小卡片 */
    gap:14px 14px; /* gap第一个值：图标行上下垂直间距；第二个值：图标卡片左右水平间距 */
    max-width:820px; /* 和上方接口网格宽度完全一致，上下板块视觉比例协调统一 */
    margin:0 auto; /* 图标网格整体水平居中 */
}
/* 单个图标卡片容器 class="icon-card" 点击跳转网页 */
.icon-card{
    text-align:center; /* 卡片内图标、文字全部居中对齐 */
    cursor:pointer; /* 鼠标悬浮手型光标，提示可点击跳转网页 */
    padding:4px; /* 卡片内部留白，数值越小卡片越紧凑小巧 */
    border-radius:10px; /* 卡片悬浮时圆角大小 */
    transition:0.2s; /* 悬浮背景渐变动画时长，数值越大切换越慢 */
}
/* 鼠标悬浮图标卡片高亮样式 */
.icon-card:hover{
    background:rgba(0,0,0,0.08); /* 悬浮浅灰色底色，0.08控制透明度深浅 */
}
/* 阿里通用SVG图标样式 修复图标大小不统一 */
.icon {
    width: 44px;  /* SVG图标宽度尺寸 */
    height: 44px; /* SVG图标高度尺寸 */
    display: inline-flex;
    align-items: center;
    justify-content: center;
    vertical-align: middle;
    margin-bottom: 6px; /* 图标与下方文字垂直间距 */
}
.icon use {
    transform: scale(1);
    transform-origin: center;
}
/* 限制内部图形最大尺寸，不管原图多大，最大只能占容器80% */
.icon use {
    max-width: 80%;
    max-height: 80%;
}
/* 图标下方文字 class="icon-text" */
.icon-text{
    font-size:12px; /* 图标底部文字字号大小，适配小尺寸图标卡片 */
    color:#222; /* 文字深灰色色值，柔和不刺眼 */
    line-height:1.3; /* 文字行高，控制多行文字上下松紧，数值越大文字上下越松散 */
}
</style>

<script>
// 【新增随机颜色函数：每次移入方块随机生成RGB色彩赋值给--randColor变量】
function setRandomColor(el){
    let r = Math.floor(Math.random() * 256);
    let g = Math.floor(Math.random() * 256);
    let b = Math.floor(Math.random() * 256);
    el.style.setProperty('--randColor', `rgb(${r},${g},${b})`);
}
function copyText(el){
    const text = el.dataset.copy;
    navigator.clipboard.writeText(text).then(()=>{
        alert("接口复制成功："+text);
    }).catch(()=>{
        alert("复制失败，请手动复制："+text);
    })
}
function openUrl(url){
    if(!url) return;
    window.open(url,"_blank");
}
function search(){
    let val = document.getElementById("kw").value.trim();
    if(!val) return alert("请输入搜索关键词");
    window.open(`https://www.baidu.com/s?wd=${encodeURIComponent(val)}`,"_blank");
}
document.getElementById("kw").addEventListener("keydown",e=>e.key=="Enter"&&search())
</script>
